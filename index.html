<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificados iToni</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--bg:#0b0f1a;
--card:rgba(255,255,255,0.05);
--text:#fff;
--muted:#9aa4c7;
--primary:#6d4aff;
--border:rgba(255,255,255,0.1);
}

body.light{
--bg:#f5f7fb;
--card:#ffffff;
--text:#0b0f1a;
--muted:#5c647f;
--border:rgba(0,0,0,0.1);
}

body{
font-family:-apple-system;
background:var(--bg);
color:var(--text);
transition:.3s;
}

/* NAVBAR */
.nav{
display:flex;
justify-content:space-between;
padding:15px 20px;
position:sticky;
top:0;
backdrop-filter:blur(12px);
background:rgba(0,0,0,.3);
z-index:1000;
}

.logo{font-weight:700}

.menu{
display:flex;
gap:20px;
}

.menu a{color:var(--text);text-decoration:none}

/* HAMBURGER */
.hamburger{
display:none;
flex-direction:column;
gap:5px;
cursor:pointer;
}

.hamburger span{
width:25px;
height:3px;
background:var(--text);
}

.mobile{
display:none;
flex-direction:column;
padding:15px;
}

.mobile.active{display:flex}

/* BUTTONS */
.btn{
background:linear-gradient(135deg,#6d4aff,#3b82f6);
color:#fff;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

/* HERO */
.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:32px;
margin-bottom:10px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
justify-content:center;
align-items:center;
}

.modal.active{display:flex}

.modal-box{
background:var(--card);
padding:25px;
border-radius:12px;
width:300px;
position:relative;
}

.close{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
}

/* RESPONSIVO */
@media(max-width:768px){
.menu{display:none}
.hamburger{display:flex}
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div class="logo">🍎 iToni</div>

<div class="menu">
<a href="#">Início</a>
<button class="btn" id="loginBtn">Login</button>
<button class="btn" id="logoutBtn" style="display:none">Sair</button>
<button class="btn" id="themeBtn">🌙</button>
</div>

<div class="hamburger" id="hamburger">
<span></span><span></span><span></span>
</div>
</div>

<div class="mobile" id="mobileMenu">
<button class="btn" id="loginBtnM">Login</button>
<button class="btn" id="logoutBtnM" style="display:none">Sair</button>
</div>

<!-- HERO -->
<div class="hero">
<h1>Certificados iOS</h1>
<p>Login real + sistema profissional</p>
</div>

<!-- LOGIN MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<div class="close" id="close">✖</div>

<h3>Login</h3>

<input id="email" placeholder="Email" style="width:100%;margin:10px 0;padding:8px">
<input id="pass" type="password" placeholder="Senha" style="width:100%;margin:10px 0;padding:8px">

<button class="btn" id="loginEmail">Entrar</button>
<button class="btn" id="loginGoogle" style="margin-top:10px;background:#ea4335">Google</button>

</div>
</div>

<script>

/* 🔥 CONFIG FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyCxHuPz2P0JR8rKOiY1yE_ZkOssnM_iK8E",
authDomain: "tonijuniortech.firebaseapp.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* LOGIN */
document.getElementById("loginEmail").onclick = ()=>{
const email = email.value;
const pass = document.getElementById("pass").value;

auth.signInWithEmailAndPassword(email,pass)
.then(()=>modal.classList.remove("active"))
.catch(()=>alert("Erro login"));
};

/* GOOGLE */
document.getElementById("loginGoogle").onclick = ()=>{
const provider = new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider);
};

/* LOGOUT */
logoutBtn.onclick = ()=>auth.signOut();
logoutBtnM.onclick = ()=>auth.signOut();

/* UI AUTH */
auth.onAuthStateChanged(user=>{
if(user){
loginBtn.style.display="none";
logoutBtn.style.display="block";
loginBtnM.style.display="none";
logoutBtnM.style.display="block";
}else{
loginBtn.style.display="block";
logoutBtn.style.display="none";
loginBtnM.style.display="block";
logoutBtnM.style.display="none";
}
});

/* MODAL */
loginBtn.onclick=()=>modal.classList.add("active");
loginBtnM.onclick=()=>modal.classList.add("active");
close.onclick=()=>modal.classList.remove("active");

/* HAMBURGER */
hamburger.onclick=()=>{
mobileMenu.classList.toggle("active");
};

/* DARK MODE */
const themeBtn = document.getElementById("themeBtn");

if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light");
themeBtn.textContent="☀️";
}

themeBtn.onclick=()=>{
document.body.classList.toggle("light");
const isLight=document.body.classList.contains("light");
localStorage.setItem("theme", isLight?"light":"dark");
themeBtn.textContent=isLight?"☀️":"🌙";
};

</script>

</body>
</html>
